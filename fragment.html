<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission 1966 – Fragment</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f5f5f5;color:#111;margin:0}
    .wrap{max-width:640px;margin:0 auto;padding:20px 16px 40px}
    .card{background:#fff;border:1px solid #ddd;border-radius:16px;padding:18px;box-shadow:0 6px 24px rgba(0,0,0,.05);margin-top:16px}
    h1{font-size:26px;margin:0 0 4px}.muted{color:#666}.btn{padding:12px 14px;border:none;border-radius:10px;background:#111;color:#fff;font-weight:bold}
    input[type=text], input[type=number], input[type=file]{width:100%;padding:14px 16px;border-radius:12px;border:1px solid #bbb;box-sizing:border-box;font-size:16px}
    .success{color:#1b5e20;font-weight:bold}.error{color:#b00020;font-weight:bold}
    img{max-width:100%;height:auto;border-radius:12px;border:1px solid #ddd}
  </style>
</head>
<body>
  <div class="wrap">
    <button class="btn" onclick="location.href='/overview.html'">Zur Übersicht</button>
    <div class="card">
      <h1 id="title">Erinnerungsfragment</h1>
      <div class="muted" id="state"></div>
    </div>
    <div class="card" id="content"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const id = Number(params.get('id'));
    const code = localStorage.getItem('mission1966_code');
    if (!code) location.href = '/';
    document.getElementById('title').textContent = `Erinnerungsfragment ${id}`;

    async function fetchFragment(){
      const res = await fetch('/api/fragment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,id})});
      const data = await res.json();
      if(!res.ok){ document.getElementById('content').innerHTML = `<div class="error">${data.error || 'Fehler'}</div>`; return; }
      render(data);
    }

    function render(data){
      const state = document.getElementById('state');
      const content = document.getElementById('content');
      if(data.is_solved){
        state.textContent = 'Dieses Erinnerungsfragment wurde bereits freigeschaltet.';
        if(data.type === 'image_upload'){
          content.innerHTML = `<p><strong>Frage:</strong> ${escapeHtml(data.question || '')}</p><p><strong>Hochgeladenes Bild:</strong></p>${data.uploaded_image_url ? `<img src="${data.uploaded_image_url}" alt="Fragmentbild" />` : '<p>Kein Bild gespeichert.</p>'}<div style="margin-top:16px"><button class="btn" onclick="location.href='/overview.html'">Eine weitere Erinnerung freischalten</button></div>`;
        } else {
          content.innerHTML = `<p><strong>Frage:</strong> ${escapeHtml(data.question || '')}</p><p><strong>Richtige Lösung:</strong> ${escapeHtml(data.answer_main || '')}</p><div style="margin-top:16px"><button class="btn" onclick="location.href='/overview.html'">Eine weitere Erinnerung freischalten</button></div>`;
        }
      } else {
        state.textContent = 'Dieses Erinnerungsfragment ist noch nicht freigeschaltet.';
        if(data.type === 'image_upload'){
          content.innerHTML = `<p>Lade das benötigte Bild hoch, um dieses Fragment freizuschalten.</p><input id="imageInput" type="file" accept="image/*" /><div style="margin-top:14px"><button class="btn" onclick="uploadImage()">Bild hochladen</button></div><div id="msg" style="margin-top:12px"></div>`;
        } else {
          content.innerHTML = `<p>Gib die Lösung für dieses Erinnerungsfragment ein.</p><input id="answerInput" type="text" autocomplete="off" /><div style="margin-top:14px"><button class="btn" onclick="submitAnswer()">Lösung prüfen</button></div><div id="msg" style="margin-top:12px"></div>`;
        }
      }
    }

    async function submitAnswer(){
      const answer = document.getElementById('answerInput').value;
      const res = await fetch('/api/submit-text',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,id,answer})});
      const data = await res.json();
      const msg = document.getElementById('msg');
      if(res.ok && data.correct){
        msg.className = 'success';
        msg.innerHTML = 'Prima, Du hast Norbert verholfen seine Erinnerung zurückzugewinnen. Füge dein Erinnerungsfragment in das Puzzle ein.<div style="margin-top:16px"><button class="btn" onclick="location.href=\'/overview.html\'">Eine weitere Erinnerung freischalten</button></div>';
        setTimeout(fetchFragment, 800);
      } else {
        msg.className = 'error';
        msg.innerHTML = 'Das war leider nicht richtig.<div style="margin-top:16px"><button class="btn" onclick="location.href=\'/overview.html\'">Eine weitere Erinnerung freischalten</button></div>';
      }
    }

    async function compressToDataUrl(file){
      const img = await new Promise((resolve,reject)=>{ const i=new Image(); i.onload=()=>resolve(i); i.onerror=reject; i.src=URL.createObjectURL(file); });
      const maxW = 1400;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      return canvas.toDataURL('image/jpeg', 0.7);
    }

    async function uploadImage(){
      const file = document.getElementById('imageInput').files?.[0];
      const msg = document.getElementById('msg');
      if(!file){ msg.className='error'; msg.textContent='Bitte zuerst ein Bild auswählen.'; return; }
      msg.className=''; msg.textContent='Bild wird hochgeladen...';
      const imageDataUrl = await compressToDataUrl(file);
      const res = await fetch('/api/upload-image',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,id,imageDataUrl})});
      const data = await res.json();
      if(res.ok){
        msg.className='success';
        msg.innerHTML='Prima, Du hast Norbert verholfen seine Erinnerung zurückzugewinnen. Füge dein Erinnerungsfragment in das Puzzle ein.<div style="margin-top:16px"><button class="btn" onclick="location.href=\'/overview.html\'">Eine weitere Erinnerung freischalten</button></div>';
        setTimeout(fetchFragment, 800);
      } else {
        msg.className='error';
        msg.textContent=data.error || 'Upload fehlgeschlagen.';
      }
    }

    function escapeHtml(s){ return String(s).replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
    fetchFragment();
  </script>
</body>
</html>
