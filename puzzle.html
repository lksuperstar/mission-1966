<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mission 1966 – Erinnerungspuzzle</title>
  <style>
    :root{--cols:10;--rows:5;--border:#111;--muted:#666;}
    *{box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#f5f5f5;color:#111;margin:0}
    .wrap{max-width:980px;margin:0 auto;padding:14px 12px 34px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
    h1{font-size:24px;margin:0;line-height:1.15}
    .btn{padding:10px 12px;border:none;border-radius:10px;background:#111;color:#fff;font-weight:bold;cursor:pointer;text-decoration:none;display:inline-block}
    .card{background:#fff;border:1px solid #ddd;border-radius:16px;padding:14px;box-shadow:0 6px 24px rgba(0,0,0,.05);margin-top:12px}
    .progressRow{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px}
    .count{font-size:28px;font-weight:bold}.muted{color:var(--muted)}
    .bar{height:12px;background:#eee;border-radius:999px;overflow:hidden;flex:1;min-width:170px;border:1px solid #ddd}.bar>div{height:100%;background:#111;width:0%}
    .board{width:100%;aspect-ratio:2048/1356;border:4px solid #222;border-radius:12px;overflow:hidden;background:#fafafa;display:grid;grid-template-columns:repeat(var(--cols),1fr);grid-template-rows:repeat(var(--rows),1fr);position:relative}
    .piece{position:relative;border:1px solid rgba(0,0,0,.16);background:#f2f2f2;overflow:hidden;display:flex;align-items:center;justify-content:center;color:#999;font-weight:bold;font-size:clamp(10px,2.8vw,18px)}
    .piece::before{content:"";position:absolute;inset:0;background-image:var(--img);background-size:calc(var(--cols) * 100%) calc(var(--rows) * 100%);background-position:var(--pos);opacity:0;transition:opacity .25s ease}
    .piece.solved::before{opacity:1}.piece.solved span{display:none}
    .legend{font-size:14px;line-height:1.45;margin-top:12px}.legend strong{display:block;margin-bottom:4px}
    @media (max-width:520px){.wrap{padding:10px 8px 28px}.card{padding:10px;border-radius:14px}h1{font-size:22px}.board{border-width:3px;border-radius:10px}.piece{font-size:10px}.count{font-size:24px}.top .btn{width:100%;text-align:center}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Erinnerungspuzzle</h1>
      <a class="btn" href="/overview.html">Zur Übersicht</a>
    </div>
    <div class="card">
      <div class="progressRow">
        <div><div class="count" id="count">0 / 50</div><div class="muted">Erinnerungsfragmente gesammelt</div></div>
        <div class="bar" aria-label="Fortschritt"><div id="barFill"></div></div>
      </div>
      <div id="board" class="board" aria-label="Puzzle aus 50 Erinnerungsfragmenten"></div>
      <div class="legend">
        <strong>So funktioniert es:</strong>
        Jedes gelöste Erinnerungsfragment enthüllt ein Puzzleteil. Sind alle 50 Fragmente gesammelt, ist das Erinnerungsbild vollständig.
      </div>
    </div>
  </div>
<script>
  const code = localStorage.getItem('mission1966_code');
  if(!code) location.href = '/';
  const COLS = 10, ROWS = 5, TOTAL = 50;
  const IMG = "url('/assets/Puzzle_Erinnerungen.jpg')";

  function makeBoard(solvedSet){
    const board = document.getElementById('board');
    board.innerHTML = '';
    for(let id=1; id<=TOTAL; id++){
      const col = (id-1) % COLS;
      const row = Math.floor((id-1) / COLS);
      const piece = document.createElement('a');
      piece.className = 'piece' + (solvedSet.has(id) ? ' solved' : '');
      piece.href = `/fragment.html?id=${id}`;
      piece.style.setProperty('--img', IMG);
      piece.style.setProperty('--pos', `${(col/(COLS-1))*100}% ${(row/(ROWS-1))*100}%`);
      piece.innerHTML = `<span>${id}</span>`;
      board.appendChild(piece);
    }
  }

  async function loadPuzzle(){
    const res = await fetch('/api/bootstrap',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
    const data = await res.json();
    if(!res.ok){localStorage.removeItem('mission1966_code');localStorage.removeItem('mission1966_role');location.href='/';return;}
    const fragments = data.fragments || [];
    const solved = new Set(fragments.filter(f => f.is_solved && f.is_active).map(f => Number(f.id)));
    const count = solved.size;
    document.getElementById('count').textContent = `${count} / ${TOTAL}`;
    document.getElementById('barFill').style.width = `${Math.round(count / TOTAL * 100)}%`;
    makeBoard(solved);
  }
  loadPuzzle();
</script>
</body>
</html>
